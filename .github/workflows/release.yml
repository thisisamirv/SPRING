---
name: Release

"on":
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            arch: x86_64
            artifact_name: spring2-linux-x86_64
          - os: ubuntu-latest
            name: linux
            arch: arm64
            artifact_name: spring2-linux-arm64
          - os: macos-latest
            name: macos
            arch: arm64
            artifact_name: spring2-macos-arm64
          - os: macos-15-intel
            name: macos
            arch: x86_64
            artifact_name: spring2-macos-x86_64
          - os: windows-latest
            name: windows
            arch: x86_64
            artifact_name: spring2-windows-x86_64.exe
    name: Build / ${{ matrix.name }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Linux x86_64 dependencies
      - name: Install Linux dependencies (x86_64)
        if: matrix.name == 'linux' && matrix.arch == 'x86_64'
        run: |
          sudo apt-get install -y \
            build-essential libomp-dev nasm ninja-build \
            python3 python3-pip python3-venv
          CMAKE_VENV="$RUNNER_TEMP/cmake-venv"
          python3 -m venv "$CMAKE_VENV"
          "$CMAKE_VENV/bin/python" -m pip install "cmake==4.2.0"
          echo "$CMAKE_VENV/bin" >> "$GITHUB_PATH"

      # Linux ARM64 build via QEMU and Docker
      - name: Set up QEMU for ARM64
        if: matrix.name == 'linux' && matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build Linux ARM64 (Docker)
        if: matrix.name == 'linux' && matrix.arch == 'arm64'
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD":/work -w /work arm64v8/ubuntu:22.04 /bin/bash -c "
            apt-get update && \
            apt-get install -y --no-install-recommends \
              build-essential libomp-dev ninja-build nasm \
              python3 python3-pip python3-venv wget && \
            python3 -m venv .cmake-venv && \
            . .cmake-venv/bin/activate && \
            python -m pip install 'cmake==4.2.0' && \
            cmake -S . -B build -G Ninja \
              -DCMAKE_C_FLAGS='-march=armv8-a+crc' \
              -DCMAKE_CXX_FLAGS='-march=armv8-a+crc' \
              -Dspring_optimize_for_native=OFF \
              -Dspring_optimize_for_portability=ON \
              -DLIBRAPIDARCHIVE_WITH_ISAL=OFF && \
            cmake --build build --parallel && \
            strip build/spring2 && \
            URL="https://github.com/linuxdeploy/linuxdeploy/releases"
            wget -q "$URL/download/continuous/linuxdeploy-aarch64.AppImage" \
              -O linuxdeploy && \
            chmod +x linuxdeploy && \
            echo 'Name=SPRING2' > spring2.desktop && \
            echo '[Desktop Entry]' >> spring2.desktop && \
            echo 'Type=Application' >> spring2.desktop && \
            echo 'Exec=spring2' >> spring2.desktop && \
            echo 'Icon=logo' >> spring2.desktop && \
            echo 'Categories=Science;Biology;' >> spring2.desktop && \
            echo 'Terminal=true' >> spring2.desktop && \
            export EXTRA_QT_PLUGINS= && \
            ./linuxdeploy --appimage-extract-and-run \
              --appdir AppDir \
              --executable build/spring2 \
              --desktop-file spring2.desktop \
              --icon-file dev/logo.png \
              --output appimage && \
            mv SPRING2-*.AppImage spring2-linux-arm64.AppImage
          "

      - name: Install macOS dependencies
        if: matrix.name == 'macos'
        run: |
          brew update
          brew install libomp nasm ninja python
          echo "MACOS_LIBOMP_PREFIX=$(brew --prefix libomp)" >> "$GITHUB_ENV"
          CMAKE_VENV="$RUNNER_TEMP/cmake-venv"
          python3 -m venv "$CMAKE_VENV"
          "$CMAKE_VENV/bin/python" -m pip install "cmake==4.2.0"
          echo "$CMAKE_VENV/bin" >> "$GITHUB_PATH"

      - name: Install native MinGW-w64 toolchain (winlibs) and tools
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          choco install -y cmake ninja nasm
          Write-Host 'Downloading winlibs...'
          $winlibs_pkg = 'winlibs-x86_64-posix-seh-' + `
                         'gcc-15.2.0-mingw-w64ucrt-14.0.0-r7.zip'
          $url = 'https://github.com/brechtsanders/winlibs_mingw/' + `
                 'releases/download/15.2.0posix-14.0.0-ucrt-r7/' + `
                 $winlibs_pkg
          $tmp = Join-Path $env:TEMP 'winlibs.zip'
          Invoke-WebRequest -Uri $url -OutFile $tmp
          Expand-Archive -Path $tmp -DestinationPath C:\mingw-w64
          Remove-Item $tmp -Force
          Write-Host 'Configuring PATH'
          $gccbin = Get-ChildItem -Path C:\mingw-w64 -Filter gcc.exe `
                    -Recurse | Select-Object -First 1 `
                    -ExpandProperty DirectoryName
          Add-Content -Path $env:GITHUB_PATH -Value $gccbin

      # Build jobs (Non-Windows)
      - name: Configure (Non-Windows)
        if: >-
          matrix.name != 'windows' &&
          (matrix.arch != 'arm64' || matrix.name != 'linux')
        shell: bash
        env:
          CC: ${{ matrix.name == 'macos' && 'clang' || 'gcc' }}
          CXX: ${{ matrix.name == 'macos' && 'clang++' || 'g++' }}
        run: |
          if [ "${{ matrix.name }}" == "macos" ]; then
            cmake -S . -B build \
              -G Ninja \
              -DOpenMP_ROOT="$MACOS_LIBOMP_PREFIX" \
              -DOpenMP_C_FLAGS="-Xpreprocessor -fopenmp" \
              -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp" \
              -DOpenMP_C_LIB_NAMES="omp" \
              -DOpenMP_CXX_LIB_NAMES="omp" \
              -DOpenMP_omp_LIBRARY="$MACOS_LIBOMP_PREFIX/lib/libomp.dylib" \
              -DLIBRAPIDARCHIVE_WITH_ISAL=OFF \
              -Dspring_optimize_for_native=OFF \
              -Dspring_optimize_for_portability=ON
          else
            cmake -S . -B build \
              -G Ninja \
              -Dspring_optimize_for_native=OFF \
              -Dspring_optimize_for_portability=ON \
              -DSPRING_STATIC_RUNTIMES=ON
          fi

      - name: Build (Non-Windows)
        if: >-
          matrix.name != 'windows' &&
          (matrix.arch != 'arm64' || matrix.name != 'linux')
        shell: bash
        run: cmake --build build --parallel

      - name: Strip Binaries (Non-Windows)
        if: >-
          matrix.name != 'windows' &&
          (matrix.arch != 'arm64' || matrix.name != 'linux')
        shell: bash
        run: strip build/spring2

      - name: Prepare Artifact (Non-Windows)
        if: matrix.name != 'windows'
        shell: bash
        run: |
          mkdir -p release
          cp build/spring2 "release/${{ matrix.artifact_name }}"
            if [ "${{ matrix.arch }}" == "x86_64" ] && \
               [ "${{ matrix.name }}" == "linux" ]; then
              DMURL="https://github.com/linuxdeploy/linuxdeploy/releases"
              wget -q "$DMURL/download/continuous/linuxdeploy-x86_64.AppImage" \
                   -O linuxdeploy
              chmod +x linuxdeploy
              echo "[Desktop Entry]" > spring2.desktop
              echo "Type=Application" >> spring2.desktop
              echo "Name=SPRING2" >> spring2.desktop
              echo "Exec=spring2" >> spring2.desktop
              echo "Icon=logo" >> spring2.desktop
              echo "Categories=Science;Biology;" >> spring2.desktop
              echo "Terminal=true" >> spring2.desktop
              export EXTRA_QT_PLUGINS=
              ./linuxdeploy --appimage-extract-and-run \
                --appdir AppDir \
                --executable build/spring2 \
                --desktop-file spring2.desktop \
                --icon-file dev/logo.png \
                --output appimage
              mv SPRING2-*.AppImage release/spring2-linux-x86_64.AppImage
            elif [ "${{ matrix.arch }}" == "arm64" ] && \
                 [ "${{ matrix.name }}" == "linux" ]; then
              cp spring2-linux-arm64.AppImage release/
            fi

      - name: Configure (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S . -B build `
            -G Ninja `
            -Dspring_optimize_for_native=OFF `
            -Dspring_optimize_for_portability=ON `
            -DSPRING_STATIC_RUNTIMES=ON

      - name: Build (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: cmake --build build --parallel

      - name: Strip Binaries (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: strip build/spring2.exe

      - name: Prepare Artifact (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          if (!(Test-Path release)) {
            New-Item -ItemType Directory -Path release
          }
          Copy-Item build/spring2.exe "release/${{ matrix.artifact_name }}"

      - name: Calculate Checksums
        shell: bash
        run: |
          cd release
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > "SHA256SUMS-${{ matrix.artifact_name }}.txt"
          else
            shasum -a 256 * > "SHA256SUMS-${{ matrix.artifact_name }}.txt"
          fi

      - name: Upload binary for universalizing
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/spring2
          retention-days: 1

      - name: Upload Artifact to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/${{ matrix.artifact_name }}
            release/*.AppImage
            release/SHA256SUMS-*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos-universal:
    name: Create macOS Universal Binary
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: spring2-macos-arm64
          path: bin-arm64

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: spring2-macos-x86_64
          path: bin-x86_64

      - name: Create Universal Binary
        run: |
          mkdir -p release
          lipo -create bin-arm64/spring2 bin-x86_64/spring2 \
            -output release/spring2-macos-universal
          chmod +x release/spring2-macos-universal
          file release/spring2-macos-universal

      - name: Calculate Checksum
        shell: bash
        run: |
          cd release
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum spring2-macos-universal > \
              SHA256SUMS-spring2-macos-universal.txt
          else
            shasum -a 256 spring2-macos-universal > \
              SHA256SUMS-spring2-macos-universal.txt
          fi

      - name: Upload Artifact to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/spring2-macos-universal
            release/SHA256SUMS-spring2-macos-universal.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
