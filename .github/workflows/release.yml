name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            arch: x86_64
            artifact_name: spring2-linux-x86_64
          - os: ubuntu-latest
            name: linux
            arch: arm64
            artifact_name: spring2-linux-arm64
          - os: macos-latest
            name: macos
            arch: universal
            artifact_name: spring2-macos-universal
          - os: windows-latest
            name: windows
            arch: x86_64
            msystem: UCRT64
            artifact_name: spring2-windows-x86_64.exe
    name: Build / ${{ matrix.name }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Linux x86_64 dependencies
      - name: Install Linux dependencies (x86_64)
        if: matrix.name == 'linux' && matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libomp-dev nasm ninja-build python3 python3-pip python3-venv
          python3 -m venv .cmake-venv
          . .cmake-venv/bin/activate
          python -m pip install "cmake==4.2.0"
          echo "$PWD/.cmake-venv/bin" >> "$GITHUB_PATH"

      # Linux ARM64 build via QEMU and Docker
      - name: Set up QEMU for ARM64
        if: matrix.name == 'linux' && matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build Linux ARM64 (Docker)
        if: matrix.name == 'linux' && matrix.arch == 'arm64'
        run: |
          docker run --rm --platform linux/arm64 -v "$PWD":/work -w /work arm64v8/ubuntu:22.04 /bin/bash -c "
            apt-get update && \
            apt-get install -y build-essential libomp-dev ninja-build nasm python3 python3-pip python3-venv && \
            python3 -m venv .cmake-venv && \
            . .cmake-venv/bin/activate && \
            python -m pip install 'cmake==4.2.0' && \
            cmake -S . -B build -G Ninja -Dspring_optimize_for_native=OFF -Dspring_optimize_for_portability=ON && \
            cmake --build build --parallel && \
            strip build/spring2 && \
            apt-get install -y wget && \
            echo "Name=SPRING2" > spring2.desktop && \
            echo "[Desktop Entry]" >> spring2.desktop && \
            echo "Type=Application" >> spring2.desktop && \
            echo "Exec=spring2" >> spring2.desktop && \
            echo "Icon=spring2" >> spring2.desktop && \
            echo "Categories=Science;Biology;" >> spring2.desktop && \
            echo "Terminal=true" >> spring2.desktop && \
            echo \"import zlib, struct; make_png = lambda w, h, p: b'\\x89PNG\\r\\n\\x1a\\n' + (lambda chunk: lambda type, data: struct.pack('>I', len(data)) + type + data + struct.pack('>I', zlib.crc32(type + data) & 0xffffffff))(0)(b'IHDR', struct.pack('>2I5B', w, h, 8, 2, 0, 0, 0)) + (lambda chunk: lambda type, data: struct.pack('>I', len(data)) + type + data + struct.pack('>I', zlib.crc32(type + data) & 0xffffffff))(0)(b'IDAT', zlib.compress(b''.join(b'\\x00' + p[i*w*3:(i+1)*w*3] for i in range(h)))) + (lambda chunk: lambda type, data: struct.pack('>I', len(data)) + type + data + struct.pack('>I', zlib.crc32(type + data) & 0xffffffff))(0)(b'IEND', b''); open('spring2.png', 'wb').write(make_png(32, 32, b'\\xff\\x00\\x00' * 1024))\" > gen_icon.py && \
            python3 gen_icon.py && \
            export EXTRA_QT_PLUGINS= && \
            ./linuxdeploy --appimage-extract-and-run --appdir AppDir --executable build/spring2 --desktop-file spring2.desktop --icon-file spring2.png --output appimage && \
            mv SPRING2-*.AppImage spring2-linux-arm64.AppImage
          "

      # macOS dependencies
      - name: Install macOS dependencies
        if: matrix.name == 'macos'
        run: |
          brew update
          brew install libomp nasm ninja python
          echo "MACOS_LIBOMP_PREFIX=$(brew --prefix libomp)" >> "$GITHUB_ENV"
          python3 -m venv .cmake-venv
          . .cmake-venv/bin/activate
          python -m pip install "cmake==4.2.0"
          echo "$PWD/.cmake-venv/bin" >> "$GITHUB_PATH"

      # Windows dependencies
      - name: Set up MSYS2
        if: matrix.name == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-nasm
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-clang

      # Build jobs (Non-Windows)
      - name: Configure (Non-Windows)
        if: matrix.name != 'windows' && (matrix.arch != 'arm64' || matrix.name != 'linux')
        shell: bash
        env:
          CC: ${{ matrix.name == 'macos' && 'clang' || 'gcc' }}
          CXX: ${{ matrix.name == 'macos' && 'clang++' || 'g++' }}
        run: |
          if [ "${{ matrix.name }}" == "macos" ]; then
            # Two-pass build for macOS to avoid arch-specific library conflicts (e.g. isa-l)
            cmake -S . -B build_arm64 \
              -G Ninja \
              -DCMAKE_OSX_ARCHITECTURES="arm64" \
              -DOpenMP_ROOT="$MACOS_LIBOMP_PREFIX" \
              -DOpenMP_C_FLAGS="-Xpreprocessor -fopenmp" \
              -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp" \
              -DOpenMP_C_LIB_NAMES="omp" \
              -DOpenMP_CXX_LIB_NAMES="omp" \
              -DOpenMP_omp_LIBRARY="$MACOS_LIBOMP_PREFIX/lib/libomp.dylib" \
              -DLIBRAPIDARCHIVE_WITH_ISAL=OFF \
              -Dspring_optimize_for_native=OFF \
              -Dspring_optimize_for_portability=ON
            cmake -S . -B build_x86_64 \
              -G Ninja \
              -DCMAKE_OSX_ARCHITECTURES="x86_64" \
              -DOpenMP_ROOT="$MACOS_LIBOMP_PREFIX" \
              -DOpenMP_C_FLAGS="-Xpreprocessor -fopenmp" \
              -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp" \
              -DOpenMP_C_LIB_NAMES="omp" \
              -DOpenMP_CXX_LIB_NAMES="omp" \
              -DOpenMP_omp_LIBRARY="$MACOS_LIBOMP_PREFIX/lib/libomp.dylib" \
              -DLIBRAPIDARCHIVE_WITH_ISAL=OFF \
              -Dspring_optimize_for_native=OFF \
              -Dspring_optimize_for_portability=ON
          else
            cmake -S . -B build \
              -G Ninja \
              -Dspring_optimize_for_native=OFF \
              -Dspring_optimize_for_portability=ON \
              -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          fi

      - name: Build (Non-Windows)
        if: matrix.name != 'windows' && (matrix.arch != 'arm64' || matrix.name != 'linux')
        shell: bash
        run: |
          if [ "${{ matrix.name }}" == "macos" ]; then
            cmake --build build_arm64 --parallel
            cmake --build build_x86_64 --parallel
          else
            cmake --build build --parallel
          fi

      - name: Strip Binaries (Non-Windows)
        if: matrix.name != 'windows' && (matrix.arch != 'arm64' || matrix.name != 'linux')
        shell: bash
        run: |
          if [ "${{ matrix.name }}" == "macos" ]; then
            strip build_arm64/spring2
            strip build_x86_64/spring2
          else
            strip build/spring2
          fi

      - name: Prepare Artifact (Non-Windows)
        if: matrix.name != 'windows'
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ matrix.name }}" == "macos" ]; then
            lipo -create build_arm64/spring2 build_x86_64/spring2 -output release/spring2-macos-universal
            file release/spring2-macos-universal
          else
            cp build/spring2 "release/${{ matrix.artifact_name }}"
            if [ "${{ matrix.arch }}" == "x86_64" ] && [ "${{ matrix.name }}" == "linux" ]; then
              wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
              chmod +x linuxdeploy
              # Create a minimal desktop file and icon for linuxdeploy to be happy
              echo "[Desktop Entry]" > spring2.desktop
              echo "Type=Application" >> spring2.desktop
              echo "Name=SPRING2" >> spring2.desktop
              echo "Exec=spring2" >> spring2.desktop
              echo "Icon=spring2" >> spring2.desktop
              echo "Categories=Science;Biology;" >> spring2.desktop
              echo "Terminal=true" >> spring2.desktop
              echo "import zlib, struct; make_png = lambda w, h, p: b'\x89PNG\r\n\x1a\n' + (lambda chunk: lambda type, data: struct.pack('>I', len(data)) + type + data + struct.pack('>I', zlib.crc32(type + data) & 0xffffffff))(0)(b'IHDR', struct.pack('>2I5B', w, h, 8, 2, 0, 0, 0)) + (lambda chunk: lambda type, data: struct.pack('>I', len(data)) + type + data + struct.pack('>I', zlib.crc32(type + data) & 0xffffffff))(0)(b'IDAT', zlib.compress(b''.join(b'\x00' + p[i*w*3:(i+1)*w*3] for i in range(h)))) + (lambda chunk: lambda type, data: struct.pack('>I', len(data)) + type + data + struct.pack('>I', zlib.crc32(type + data) & 0xffffffff))(0)(b'IEND', b''); open('spring2.png', 'wb').write(make_png(32, 32, b'\xff\x00\x00' * 1024))" > gen_icon.py
              python3 gen_icon.py
              export EXTRA_QT_PLUGINS=
              ./linuxdeploy --appimage-extract-and-run --appdir AppDir --executable build/spring2 --desktop-file spring2.desktop --icon-file spring2.png --output appimage
              mv SPRING2-*.AppImage release/spring2-linux-x86_64.AppImage
            elif [ "${{ matrix.arch }}" == "arm64" ] && [ "${{ matrix.name }}" == "linux" ]; then
              cp spring2-linux-arm64.AppImage release/
            fi
          fi

      # Build jobs (Windows)
      - name: Configure (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S . -B build \
            -G Ninja \
            -Dspring_optimize_for_native=OFF \
            -Dspring_optimize_for_portability=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

      - name: Build (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Strip Binaries (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: strip build/spring2.exe

      - name: Prepare Artifact (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          mkdir -p release
          cp build/spring2.exe "release/${{ matrix.artifact_name }}"

      - name: Calculate Checksums (Non-Windows)
        if: matrix.name != 'windows'
        shell: bash
        run: |
          cd release
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS.txt
          else
            shasum -a 256 * > SHA256SUMS.txt
          fi

      - name: Calculate Checksums (Windows)
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Upload Artifact to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/${{ matrix.artifact_name }}
            release/*.AppImage
            release/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
