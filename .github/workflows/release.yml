---
name: Release

"on":
    release:
        types: [ published ]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      name: linux
                      arch: x86_64
                      artifact_name: spring2-linux-x86_64
                    - os: ubuntu-24.04-arm
                      name: linux
                      arch: arm64
                      artifact_name: spring2-linux-arm64
                    - os: macos-latest
                      name: macos
                      arch: arm64
                      artifact_name: spring2-macos-arm64
                    - os: macos-15-intel
                      name: macos
                      arch: x86_64
                      artifact_name: spring2-macos-x86_64
                    - os: windows-latest
                      name: windows
                      arch: x86_64
                      artifact_name: spring2-windows-x86_64.exe
        name: Build / ${{ matrix.name }} (${{ matrix.arch }})
        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Ensure vendored tools are executable on Unix
              if: matrix.name != 'windows'
              shell: bash
              run: |
                  chmod +x dev/ninja/linux/ninja dev/ninja/linux-aarch64/ninja dev/ninja/mac/ninja
                  chmod +x dev/nasm/linux/nasm dev/nasm/macosx/nasm

            - name: Build Linux (Docker)
              if: matrix.name == 'linux'
              run: |
                  DOCKER_IMAGE="almalinux:8"
                  DOCKER_PLATFORM="linux/amd64"
                  ARCH_SUFFIX="x86_64"
                  CMAKE_EXTRA_FLAGS="-DSPRING_STATIC_RUNTIMES=ON"

                  if [ "${{ matrix.arch }}" == "arm64" ]; then
                    DOCKER_IMAGE="arm64v8/almalinux:8"
                    DOCKER_PLATFORM="linux/arm64"
                    ARCH_SUFFIX="aarch64"
                    CMAKE_EXTRA_FLAGS="-DCMAKE_C_FLAGS='-march=armv8-a+crc' \
                      -DCMAKE_CXX_FLAGS='-march=armv8-a+crc' -DSPRING_ENABLE_IPO=OFF"
                  fi

                  docker run --rm --platform "$DOCKER_PLATFORM" \
                    -e ARCH_SUFFIX="$ARCH_SUFFIX" \
                    -e CMAKE_EXTRA_FLAGS="$CMAKE_EXTRA_FLAGS" \
                    -v "$PWD":/work -w /work "$DOCKER_IMAGE" /bin/bash -c "
                    dnf install -y epel-release dnf-plugins-core && \
                    (dnf config-manager --set-enabled powertools || \
                      dnf config-manager --set-enabled crb) && \
                    dnf install -y gcc-toolset-12-gcc-c++ libomp-devel \
                      python39 python39-pip wget \
                      fuse-libs file && \
                    source /opt/rh/gcc-toolset-12/enable && \
                    python3.9 -m venv .cmake-venv && \
                    . .cmake-venv/bin/activate && \
                    NINJA_PATH=/work/dev/ninja/linux/ninja && \
                    if [ "\$ARCH_SUFFIX" = "aarch64" ]; then \
                      NINJA_PATH=/work/dev/ninja/linux-aarch64/ninja; \
                    fi && \
                    chmod +x \$NINJA_PATH /work/dev/nasm/linux/nasm && \
                    python3.9 -m pip install 'cmake==4.2.0' && \
                    cmake -S . -B build -G Ninja \
                      -DCMAKE_MAKE_PROGRAM=\$NINJA_PATH \
                      -DLIBRAPIDARCHIVE_WITH_ISAL=OFF \
                      \$CMAKE_EXTRA_FLAGS && \
                    cmake --build build --parallel && \
                    cmake --install build --prefix spring2 && \
                    tar -czf spring2-linux-${{ matrix.arch }}.tar.gz spring2 && \
                    file spring2/bin/spring2 && \
                    ldd spring2/bin/spring2 && \
                    export LINUXDEPLOY_DEBUG=1 && \
                    URL='https://github.com/linuxdeploy/linuxdeploy/' && \
                    URL=\"\${URL}releases/download/continuous/\" && \
                    URL=\"\${URL}linuxdeploy-\$ARCH_SUFFIX.AppImage\" && \
                    wget \"\$URL\" -O linuxdeploy && \
                    chmod +x linuxdeploy && \
                    echo '[Desktop Entry]' > logo.desktop && \
                    echo 'Type=Application' >> logo.desktop && \
                    echo 'Name=SPRING2' >> logo.desktop && \
                    echo 'Exec=spring2' >> logo.desktop && \
                    echo 'Icon=logo' >> logo.desktop && \
                    echo 'Categories=Science;Biology;' >> logo.desktop && \
                    echo 'Terminal=true' >> logo.desktop && \
                    export EXTRA_QT_PLUGINS= && \
                    cp assets/icons/logo.png logo.png && \
                    ./linuxdeploy --appimage-extract-and-run \
                      --appdir AppDir \
                      --executable spring2/bin/spring2 \
                      --desktop-file logo.desktop \
                      --icon-file logo.png \
                      --output appimage \
                      --verbosity=2 && \
                    mv SPRING2-*.AppImage spring2-linux-${{ matrix.arch }}.AppImage
                  "

            - name: Install macOS dependencies
              if: matrix.name == 'macos'
              run: |
                  brew update
                  brew install libomp python
                  echo "MACOS_LIBOMP_PREFIX=$(brew --prefix libomp)" >> "$GITHUB_ENV"
                  CMAKE_VENV="$RUNNER_TEMP/cmake-venv"
                  python3 -m venv "$CMAKE_VENV"
                  "$CMAKE_VENV/bin/python" -m pip install "cmake==4.2.0"
                  echo "$CMAKE_VENV/bin" >> "$GITHUB_PATH"

            - name: Install native MinGW-w64 toolchain (winlibs) and tools
              if: matrix.name == 'windows'
              shell: powershell
              run: |
                  $wingetFlags = @(
                    "--source", "winget",
                    "--exact",
                    "--accept-source-agreements",
                    "--accept-package-agreements",
                    "--disable-interactivity"
                  )

                  winget install --id BrechtSanders.WinLibs.MCF.UCRT @wingetFlags
                  winget install --id Git.Git @wingetFlags

                  Write-Host 'Configuring PATH for WinLibs GCC toolchain'
                  $searchRoots = @(
                    "$env:LOCALAPPDATA\Microsoft\WinGet\Packages",
                    "$env:LOCALAPPDATA\Microsoft\WinGet\Links",
                    "$env:ProgramFiles\WinLibs",
                    "$env:ProgramFiles\mingw64",
                    "$env:SystemDrive\mingw64"
                  ) | Where-Object { Test-Path $_ }

                  $gcc = $null
                  foreach ($root in $searchRoots) {
                    $gcc = Get-ChildItem -Path $root -Filter gcc.exe -Recurse -File -ErrorAction SilentlyContinue |
                      Select-Object -First 1
                    if ($gcc) { break }
                  }

                  if (-not $gcc) {
                    throw 'Unable to locate gcc.exe after WinLibs installation'
                  }

                  Add-Content -Path $env:GITHUB_PATH -Value $gcc.DirectoryName

                  # Install pinned CMake in a Python virtualenv and prepend it to PATH.
                  $cmakeVenv = Join-Path $env:RUNNER_TEMP "cmake-venv"
                  py -3 -m venv $cmakeVenv
                  & "$cmakeVenv\Scripts\python.exe" -m pip install --upgrade pip
                  & "$cmakeVenv\Scripts\python.exe" -m pip install "cmake==4.2.0"
                  Add-Content -Path $env:GITHUB_PATH -Value "$cmakeVenv\Scripts"
                  & "$cmakeVenv\Scripts\cmake.exe" --version

            # Build jobs (Non-Windows)
            - name: Configure (macOS)
              if: matrix.name == 'macos'
              run: |
                  cmake -S . -B build -G Ninja \
                    -DCMAKE_MAKE_PROGRAM="$GITHUB_WORKSPACE/dev/ninja/mac/ninja"

            - name: Build and Strip (macOS)
              if: matrix.name == 'macos'
              run: |
                  cmake --build build --parallel
                  cmake --install build --prefix spring2
                  strip spring2/bin/spring2

            - name: Prepare Artifacts (Linux/macOS)
              if: matrix.name != 'windows'
              run: |
                  mkdir -p release
                  if [ "${{ matrix.name }}" == "linux" ]; then
                    cp spring2-linux-${{ matrix.arch }}.AppImage release/
                    cp spring2-linux-${{ matrix.arch }}.tar.gz release/
                  else
                    cp spring2/bin/spring2 "release/${{ matrix.artifact_name }}"
                  fi

            - name: Configure (Windows)
              if: matrix.name == 'windows'
              shell: powershell
              run: |
                  $env:CC="gcc"
                  $env:CXX="g++"
                  $vendoredNinja = (Join-Path $env:GITHUB_WORKSPACE 'dev/ninja/win/ninja.exe') -replace '\\','/'
                  cmake -S . -B build `
                    -G Ninja `
                    -DCMAKE_MAKE_PROGRAM="$vendoredNinja" `
                    -DSPRING_STATIC_RUNTIMES=ON

            - name: Build (Windows)
              if: matrix.name == 'windows'
              shell: powershell
              run: |
                  magick assets/icons/logo.png `
                    -define icon:auto-resize=16,32,48,64,128,256 `
                    assets/icons/logo.ico
                  $env:CC="gcc"
                  $env:CXX="g++"
                  cmake --build build --parallel
                  cmake --install build --prefix spring2
                  strip spring2/bin/spring2.exe

            - name: Prepare Artifact (Windows)
              if: matrix.name == 'windows'
              shell: powershell
              run: |
                  if (!(Test-Path release)) {
                    New-Item -ItemType Directory -Path release
                  }
                  Copy-Item spring2/bin/spring2.exe "release/${{ matrix.artifact_name }}"

            - name: Upload binary for universalizing
              if: matrix.name == 'macos'
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: |
                      spring2/bin/spring2
                  retention-days: 1

            - name: Upload Artifact to Release
              uses: softprops/action-gh-release@v2
              if: startsWith(github.ref, 'refs/tags/')
              with:
                  files: |
                      release/${{ matrix.artifact_name }}
                      release/*.AppImage
                      release/*.tar.gz
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    macos-universal:
        name: Create macOS Universal DMG
        needs: build
        if: always() && needs.build.result != 'cancelled'
        runs-on: macos-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download arm64 binaries
              uses: actions/download-artifact@v4
              with:
                  name: spring2-macos-arm64
                  path: bin-arm64

            - name: Download x86_64 binaries
              uses: actions/download-artifact@v4
              with:
                  name: spring2-macos-x86_64
                  path: bin-x86_64

            - name: Create Universal Binaries
              run: |
                  mkdir -p universal-bin
                  lipo -create bin-arm64/spring2 bin-x86_64/spring2 \
                    -output universal-bin/spring2
                  chmod +x universal-bin/spring2

            - name: Generate macOS Icon
              run: |
                  mkdir spring2.iconset
                  sips -z 16 16     assets/icons/logo.png --out spring2.iconset/icon_16x16.png
                  sips -z 32 32     assets/icons/logo.png --out spring2.iconset/icon_16x16@2x.png
                  sips -z 32 32     assets/icons/logo.png --out spring2.iconset/icon_32x32.png
                  sips -z 64 64     assets/icons/logo.png --out spring2.iconset/icon_32x32@2x.png
                  sips -z 128 128   assets/icons/logo.png --out spring2.iconset/icon_128x128.png
                  sips -z 256 256   assets/icons/logo.png \
                    --out spring2.iconset/icon_128x128@2x.png
                  sips -z 256 256   assets/icons/logo.png --out spring2.iconset/icon_256x256.png
                  sips -z 512 512   assets/icons/logo.png \
                    --out spring2.iconset/icon_256x256@2x.png
                  sips -z 512 512   assets/icons/logo.png --out spring2.iconset/icon_512x512.png
                  cp assets/icons/logo.png spring2.iconset/icon_512x512@2x.png
                  iconutil -c icns spring2.iconset
                  rm -rf spring2.iconset

            - name: Create DMG
              run: |
                  brew install create-dmg
                  mkdir -p dmg-root
                  cp universal-bin/spring2 dmg-root/
                  ln -s /usr/local/bin dmg-root/bin

                  create-dmg \
                    --volname "SPRING2" \
                    --volicon "spring2.icns" \
                    --window-pos 200 120 \
                    --window-size 600 300 \
                    --icon-size 100 \
                    --icon "spring2" 200 150 \
                    --icon "bin" 400 150 \
                    --hide-extension "spring2" \
                    "spring2-macos-universal.dmg" \
                    "dmg-root/"

            - name: Upload Artifact to Release
              uses: softprops/action-gh-release@v2
              if: startsWith(github.ref, 'refs/tags/')
              with:
                  files: |
                      spring2-macos-universal.dmg
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
