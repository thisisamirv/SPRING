name: Sanitizers

on:
    push:
        branches: [ main ]
    pull_request:

jobs:
    sanitize:
        name: Sanitizers (${{ matrix.sanitizer }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                sanitizer: [ asan_ubsan, tsan ]
                include:
                    - sanitizer: asan_ubsan
                      build_dir: build-asan
                      san_flags: "-g -O1 -fno-omit-frame-pointer -fsanitize=address,undefined"
                      ld_flags: "-fsanitize=address,undefined"
                      options: "ASAN_OPTIONS=detect_leaks=1:abort_on_error=1"
                    - sanitizer: tsan
                      build_dir: build-tsan
                      san_flags: "-g -O1 -fno-omit-frame-pointer -fsanitize=thread"
                      ld_flags: "-fsanitize=thread"
                      options: "TSAN_OPTIONS=halt_on_error=1:suppressions=${{ github.workspace
                          }}/tests/tsan.supp"
        env:
            BUILD_DIR: ${{ matrix.build_dir }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential libomp-dev nasm ninja-build python3 python3-pip python3-venv

            - name: Install CMake (pip v4.2.0)
              run: |
                  CMAKE_VENV="$RUNNER_TEMP/cmake-venv"
                  python3 -m venv "$CMAKE_VENV"
                  "$CMAKE_VENV/bin/python" -m pip install "cmake==4.2.0"
                  echo "$CMAKE_VENV/bin" >> "$GITHUB_PATH"

            - name: Configure CMake with sanitizer flags
              run: |
                  # Ensure TSAN suppressions file is referenced with the runner workspace
                  if [ "${{ matrix.sanitizer }}" = "tsan" ]; then
                    echo "TSAN_OPTIONS=halt_on_error=1:suppressions=$GITHUB_WORKSPACE/tests/tsan.supp" >> $GITHUB_ENV
                  else
                    echo "${{ matrix.options }}" >> $GITHUB_ENV
                  fi
                  cmake -S . -B $BUILD_DIR -G Ninja -DCMAKE_BUILD_TYPE=Debug \
                    -DCMAKE_C_FLAGS="${{ matrix.san_flags }}" -DCMAKE_CXX_FLAGS="${{ matrix.san_flags }}" \
                    -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.ld_flags }}" -DCMAKE_SHARED_LINKER_FLAGS="${{ matrix.ld_flags }}"

            - name: Build
              run: |
                  cmake --build $BUILD_DIR -j

            - name: Run all tests (Unit + Smoke) with Sanitizers
              env:
                  BUILD_DIR: ${{ github.workspace }}/${{ matrix.build_dir }}
              run: ctest --test-dir ${{ matrix.build_dir }} --output-on-failure

            - name: Upload logs on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.sanitizer }}-build-artifacts
                  path: |
                      $BUILD_DIR
