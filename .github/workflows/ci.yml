---
name: CI

"on":
  push:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-smoke:
    name: Build and smoke / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            shell: bash
          - os: macos-latest
            name: macOS
            shell: bash
          - os: windows-latest
            name: Windows
            shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libomp-dev \
            nasm \
            ninja-build \
            python3 \
            python3-pip \
            python3-venv

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install libomp nasm ninja python
          echo "MACOS_LIBOMP_PREFIX=$(brew --prefix libomp)" >> "$GITHUB_ENV"

      - name: Install CMake on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          CMAKE_VENV="$RUNNER_TEMP/cmake-venv"
          python3 -m venv "$CMAKE_VENV"
          "$CMAKE_VENV/bin/python" -m pip install --upgrade pip
          "$CMAKE_VENV/bin/python" -m pip install "cmake==4.2.0"
          echo "$CMAKE_VENV/bin" >> "$GITHUB_PATH"
          "$CMAKE_VENV/bin/cmake" --version

      - name: Install native MinGW-w64 toolchain (winlibs) and tools
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install -y cmake ninja nasm
          Write-Host 'Downloading winlibs...'
          $url = 'https://github.com/brechtsanders/winlibs_mingw/releases/' + `
                 'download/15.2.0posix-14.0.0-ucrt-r7/' + `
                 'winlibs-x86_64-posix-seh-gcc-15.2.0-mingw-w64ucrt-14.0.0-r7.zip'
          $tmp = Join-Path $env:TEMP 'winlibs.zip'
          Invoke-WebRequest -Uri $url -OutFile $tmp
          Expand-Archive -Path $tmp -DestinationPath C:\mingw-w64
          Remove-Item $tmp -Force
          Write-Host 'Configuring PATH'
          $gccbin = Get-ChildItem -Path C:\mingw-w64 -Filter gcc.exe `
                    -Recurse | Select-Object -First 1 `
                    -ExpandProperty DirectoryName
          Add-Content -Path $env:GITHUB_PATH -Value $gccbin

      - name: Configure on Linux
        if: runner.os == 'Linux'
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S . -B build -G Ninja

      - name: Configure on macOS
        if: runner.os == 'macOS'
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build -G Ninja

      - name: Configure on Windows
        if: runner.os == 'Windows'
        shell: powershell
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S . -B build -G Ninja

      - name: Build on Linux and macOS
        if: runner.os != 'Windows'
        run: |
          cmake --build build --parallel
          cmake --install build --prefix spring2

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          magick assets/icons/logo.png `
            -define icon:auto-resize=16,32,48,64,128,256 `
            assets/icons/logo.ico
          cmake --build build --parallel
          cmake --install build --prefix spring2

      - name: Smoke test on Linux and macOS
        env:
          SPRING_BIN: ./spring2/bin/spring2
          SPRING_PREVIEW_BIN: ./spring2/bin/spring2-preview
        run: tests/smoke_test.sh

      - name: Smoke test on Windows
        env:
          SPRING_BIN: ./spring2/bin/spring2.exe
          SPRING_PREVIEW_BIN: ./spring2/bin/spring2-preview.exe
          SPRING_TEST_ARGS: -t 1 --memory 1
          SPRING_SMOKE_MODE: windows-quick
        run: .\tests\smoke_test.ps1

  static-analysis:
    name: Analysis / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            shell: bash
          - os: macos-latest
            name: macOS
            shell: bash
          - os: windows-latest
            name: Windows
            shell: msys2 {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux analysis dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-tidy \
            cppcheck \
            libomp-dev \
            nasm \
            ninja-build \
            python3 \
            python3-venv \
            valgrind

      - name: Install macOS analysis dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install libomp nasm ninja llvm cppcheck python
          echo "MACOS_LIBOMP_PREFIX=$(brew --prefix libomp)" >> "$GITHUB_ENV"
          echo "HOMEBREW_LLVM_BIN=$(brew --prefix llvm)/bin" >> "$GITHUB_ENV"

      - name: Install CMake on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          CMAKE_VENV="$RUNNER_TEMP/cmake-venv"
          python3 -m venv "$CMAKE_VENV"
          "$CMAKE_VENV/bin/python" -m pip install --upgrade pip
          "$CMAKE_VENV/bin/python" -m pip install "cmake==4.2.0"
          echo "$CMAKE_VENV/bin" >> "$GITHUB_PATH"
          "$CMAKE_VENV/bin/cmake" --version

      - name: Set up MSYS2 analysis environment
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-nasm
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-clang-tools-extra
            mingw-w64-ucrt-x86_64-python

      - name: Configure on Linux
        if: runner.os == 'Linux'
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S . -B build -G Ninja

      - name: Configure on macOS
        if: runner.os == 'macOS'
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build -G Ninja

      - name: Configure on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S . -B build -G Ninja

      - name: Build for analysis on Linux and macOS
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Generate Icon on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          magick assets/icons/logo.png `
            -define icon:auto-resize=16,32,48,64,128,256 `
            assets/icons/logo.ico

      - name: Build for analysis on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Run lint on Linux
        if: runner.os == 'Linux'
        run: ./dev/lint.sh

      - name: Run lint on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          export PATH="$HOMEBREW_LLVM_BIN:$PATH"
          ./dev/lint.sh

      - name: Run lint on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: .\dev\lint.ps1

      - name: Run cppcheck on Linux and macOS
        if: runner.os != 'Windows'
        run: ./dev/cppcheck.sh

      - name: Run valgrind smoke test
        if: runner.os == 'Linux'
        run: ./dev/valgrind-smoke.sh

      - name: Skip valgrind on macOS
        if: runner.os == 'macOS'
        run: |
          echo "Valgrind is not available in a practical form on " \
               "GitHub-hosted macOS runners; skipping."

      - name: Skip valgrind on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host ("Valgrind is not available on GitHub-hosted Windows " + `
                      "runners; skipping.")
